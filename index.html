<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>Three Webapp Framework</title>
  </head>
  <body>
    <div id="app"></div>

    <div class="menu" id="menu">
      <div class="menu-row">
        <div class="btn artwork-nav__prev" aria-label="Previous artwork">&#8592;</div>
        <div class="btn artwork-nav__list-btn" aria-label="All artworks">All works</div>
        <div class="btn artwork-nav__next" aria-label="Next artwork">&#8594;</div>
      </div>
      <div class="menu-divider"></div>
      <div class="menu-row">
        <div class="btn" data-loc="lobby">Lobby</div>
        <div class="btn" data-loc="galleryA">Gallery A</div>
        <div class="btn" data-loc="galleryB">Gallery B</div>
        <div class="btn" data-loc="winners">Winners</div>
      </div>
    </div>

    <div id="info-panel" class="info-panel">
      <div class="info-panel__header">
        <div class="info-panel__title"></div>
        <button class="info-panel__close" aria-label="Close">&#10005;</button>
      </div>
      <div class="info-panel__artist"></div>
      <div class="info-panel__description"></div>
    </div>

    <div id="artwork-list" class="artwork-list">
      <div class="artwork-list__header">
        <span class="artwork-list__heading">All Artworks</span>
        <button class="artwork-list__close" aria-label="Close list">&#10005;</button>
      </div>
      <div class="artwork-list__items"></div>
    </div>

    <!-- Main application script -->
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
